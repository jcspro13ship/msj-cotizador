// Fallback: detect price columns by index if aliases don't match
function detectPriceKeysFallback(keys) {
  // Find all columns that look like prices (contain "precio" or "price" or "valor")
  const priceKeys = keys.filter(k => /precio|price|valor|costo|cost/i.test(k));
  const result = { pv: null, vet: null, pub: null };
  if(priceKeys.length >= 1) result.pv  = priceKeys[0];
  if(priceKeys.length >= 2) result.vet = priceKeys[1];
  if(priceKeys.length >= 3) result.pub = priceKeys[2];
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,"").toLowerCase());
  return lines.slice(1).map(line => {
    const cols=[]; let cur="", inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;continue;}
      if(line[i]===","&&!inQ){cols.push(cur.trim());cur="";continue;}
      cur+=line[i];
    }
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{obj[h]=cols[i]||"";});
    return obj;
  }).filter(r=>r[headers[0]]);
}

function parseCOPValue(n) {
  if(n===null||n===undefined||n==="") return 0;
  // If already a number, use directly
  if(typeof n === "number") return n;
  let s = String(n).trim();
  // Remove currency symbols and spaces
  s = s.replace(/[$COP\s]/g, "");
  // Colombian format: 15.000,50 → dots are thousands, comma is decimal
  // Check if it has a comma (decimal separator in CO format)
  if(s.includes(",") && s.includes(".")) {
    // e.g. "15.000,50" → remove dots, replace comma with dot
    s = s.replace(/\./g,"").replace(",",".");
  } else if(s.includes(",") && !s.includes(".")) {
    // e.g. "15,000" could be US format or CO decimal
    // If digits after comma <= 2, treat as decimal; else thousands separator
    const parts = s.split(",");
    if(parts[1] && parts[1].length <= 2) {
      s = s.replace(",",".");
    } else {
      s = s.replace(/,/g,"");
    }
  } else if(s.includes(".") && !s.includes(",")) {
    // e.g. "15.000" in CO format = 15000 (thousands separator)
    // But "15.5" = 15.5 decimal — check digits after last dot
    const parts = s.split(".");
    const lastPart = parts[parts.length-1];
    if(lastPart.length === 3) {
      // Thousands separator: "15.000" → 15000
      s = s.replace(/\./g,"");
    }
    // else leave as decimal: "15.50" → 15.50
  }
  const v = parseFloat(s);
  return isNaN(v) ? 0 : v;
}
function fmt(n) {
  const num = parseCOPValue(n);
  if(num===0) return "—";
  return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",minimumFractionDigits:0,maximumFractionDigits:0}).format(num);
}
function fmtNum(n){ return parseCOPValue(n); }

  const priceKeys = useMemo(()=>{
    if(!products.length) return {};
    const k = Object.keys(products[0]);

    // Normalize: lowercase, trim, collapse spaces, remove accents
    const norm = s => s.toLowerCase().trim()
      .replace(/\s+/g," ")
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"");

    const normAliases = {
      pv:  ["precio pv","precio punto de venta","pv","pventa","precio_pv","p. venta","p.venta","punto de venta","punto venta"],
      vet: ["precio veterinario","precio vet","vet","veterinario","precio_vet","p. veterinario","p.veterinario","precio veterinarios"],

    };

    const res = {};
    // Pass 1: exact normalized match
    Object.entries(normAliases).forEach(([type,aliases])=>{
      res[type] = k.find(x => aliases.includes(norm(x))) || null;
    });
    // Pass 2: partial match
    Object.entries(normAliases).forEach(([type,aliases])=>{
      if(!res[type]){
        res[type] = k.find(x => {
          const nx = norm(x);
          return aliases.some(a => nx.includes(a) || a.includes(nx));
        }) || null;
      }
    });
    // Pass 3: fallback by position (3rd price column = pub)
    const fallback = detectPriceKeysFallback(k);
    if(!res.pv)  res.pv  = fallback.pv;
    if(!res.vet) res.vet = fallback.vet;
    if(!res.pub) res.pub = fallback.pub;

  const categories = useMemo(()=>{
    if(!catKey) return [];
    return [...new Set(products.map(p=>p[catKey]).filter(Boolean))].sort();
  },[products,catKey]);

  const filtered = useMemo(()=>products.filter(p=>{
    const n=(p[nameKey]||"").toLowerCase();
    const c=codeKey?(p[codeKey]||"").toLowerCase():"";
    const cat=catKey?p[catKey]:"";
    return (!search||n.includes(search.toLowerCase())||c.includes(search.toLowerCase()))
        && (category==="all"||cat===category);
  }),[products,search,category,nameKey,codeKey,catKey]);

  const grouped = useMemo(()=>{
    if(!catKey) return null;
    const g={};
    filtered.forEach(p=>{ const cat=p[catKey]||"Sin categoría"; if(!g[cat])g[cat]=[]; g[cat].push(p); });
    return g;
  },[filtered,catKey]);

  const addToQuote = p => {
    const pk=priceKeys[activeList];
    const price=pk?fmtNum(p[pk]):0;
    const id=(codeKey?p[codeKey]:"")+"|"+p[nameKey];
    setQuote(prev=>{
      const ex=prev.find(q=>q.id===id&&q.listType===activeList);
      if(ex) return prev.map(q=>q.id===id&&q.listType===activeList?{...q,qty:q.qty+1}:q);
      return [...prev,{id,product:p,price,listType:activeList,listLabel:LISTS.find(l=>l.key===activeList)?.label,qty:1}];
    });
  };
  const updQty=(id,lt,d)=>setQuote(prev=>prev.map(q=>q.id===id&&q.listType===lt?{...q,qty:Math.max(0,q.qty+d)}:q).filter(q=>q.qty>0));
  const rmQuote=(id,lt)=>setQuote(prev=>prev.filter(q=>!(q.id===id&&q.listType===lt)));

  const subtotal=quote.reduce((s,q)=>s+q.price*q.qty,0);
  const discAmt=subtotal*(disc/100);
  const total=subtotal-discAmt;

  const printQuote=()=>{
    const w=window.open("","_blank");
    const date=new Date().toLocaleDateString("es-CO",{year:"numeric",month:"long",day:"numeric"});
    const rows=quote.map(q=>`<tr>
      <td>${codeKey?q.product[codeKey]||"":""}</td>
      <td>${q.product[nameKey]}</td>
      <td class="center">${q.qty}</td>
      <td class="right">${fmt(q.price)}</td>
      <td class="right">${fmt(q.price*q.qty)}</td>
    </tr>`).join("");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cotización MSJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:"Nunito",sans-serif;color:#1A2A3A;background:white;padding:40px;max-width:820px;margin:0 auto}
      .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:3px solid #1B3B6F;margin-bottom:28px}
      .logo{height:80px;width:80px;object-fit:contain}
      .brand-name{font-size:26px;font-weight:900;color:#1B3B6F}
      .doc-label{font-size:12px;color:#3CBFBF;font-weight:700;text-transform:uppercase;letter-spacing:2px}
      .meta{display:flex;gap:16px;margin-bottom:24px}
      .meta-box{background:#F4F7FB;border-radius:10px;padding:12px 16px;flex:1;border-left:4px solid #2064A0}
      .meta-lbl{font-size:10px;color:#5A7890;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:3px}
      .meta-val{font-size:14px;font-weight:700}
      table{width:100%;border-collapse:collapse;margin-bottom:0}
      thead tr{background:#1B3B6F;color:white}
      th{padding:11px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;text-align:left}
      td{padding:10px 14px;font-size:13px;border-bottom:1px solid #E8EDF6}
      tr:nth-child(even) td{background:#FAFCFF}
      .center{text-align:center}.right{text-align:right;font-weight:700}
      .sub-row td{background:#EAF2FB!important;font-weight:600;font-size:13px}
      .disc-row td{background:#FFF8ED!important;color:#E67E22;font-weight:600}
      .tot-row td{background:#1B3B6F!important;color:white!important;font-size:17px;font-weight:800;padding:14px}
      .notes{background:#F4F7FB;border-radius:10px;padding:16px;margin-top:20px;border-left:4px solid #3CBFBF}
      .notes-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#3CBFBF;margin-bottom:6px}
      .footer{margin-top:32px;text-align:center;font-size:11px;color:#A8BFCF;border-top:1px solid #E8EDF6;padding-top:16px}
    </style></head><body>
    <div class="header">
      <img class="logo" src="${LOGO}" />
      <div style="text-align:right"><div class="brand-name">MSJ</div><div class="doc-label">Cotización</div></div>
    </div>
    <div class="meta">
      ${client?`<div class="meta-box"><div class="meta-lbl">Cliente</div><div class="meta-val">${client}</div></div>`:""}
      <div class="meta-box"><div class="meta-lbl">Fecha</div><div class="meta-val">${date}</div></div>
      <div class="meta-box"><div class="meta-lbl">Ítems</div><div class="meta-val">${quote.reduce((s,q)=>s+q.qty,0)} unidades</div></div>
    </div>
    <table>
      <thead><tr><th>Código</th><th>Producto</th><th class="center">Cant.</th><th class="right">Precio Unit.</th><th class="right">Total</th></tr></thead>
      <tbody>${rows}
        ${disc>0?`<tr class="sub-row"><td colspan="4" style="text-align:right">Subtotal</td><td class="right">${fmt(subtotal)}</td></tr>
        <tr class="disc-row"><td colspan="4" style="text-align:right">Descuento (${disc}%)</td><td class="right">−${fmt(discAmt)}</td></tr>`:""}
        <tr class="tot-row"><td colspan="4" style="text-align:right">TOTAL</td><td class="right">${fmt(total)}</td></tr>
      </tbody>
    </table>
    ${note?`<div class="notes"><div class="notes-t">Notas y condiciones</div><p style="font-size:13px">${note}</p></div>`:""}
    <div class="footer">MSJ — Documento generado automáticamente · No es contrato de venta</div>
    </body></html>`);
    w.document.close(); w.print();
  };

  const activeType=LISTS.find(l=>l.key===activeList);

  const ProductRow=({p,idx})=>{
    const pk=priceKeys[activeList];
    const price=pk?fmtNum(p[pk]):null;
    const pid=(codeKey?p[codeKey]:"")+"|"+p[nameKey];
    const qi=quote.find(q=>q.id===pid&&q.listType===activeList);
    return (
      <div style={{display:"grid",gridTemplateColumns:codeKey?"90px 1fr"+(catKey?" 130px":"")+" 130px 140px":"1fr"+(catKey?" 130px":"")+" 130px 140px",padding:"11px 20px",gap:12,alignItems:"center",borderBottom:`1px solid ${C.border}`,background:qi?"#EBF9F9":idx%2===0?"white":C.rowAlt,transition:"background .1s"}}>
        {codeKey&&<div style={{fontSize:12,color:C.muted,fontFamily:"monospace",fontWeight:600}}>{p[codeKey]}</div>}
        <div style={{fontSize:14,fontWeight:600,color:C.text}}>{p[nameKey]}</div>
        {catKey&&<span style={{fontSize:11,color:C.blue,background:C.blueLight,padding:"3px 10px",borderRadius:20,fontWeight:700,whiteSpace:"nowrap",width:"fit-content"}}>{p[catKey]}</span>}
        <div style={{textAlign:"right",fontSize:15,fontWeight:800,color:activeType?.color}}>{price&&price>0?fmt(price):<span style={{color:C.border}}>N/D</span>}</div>
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          {qi?(
            <div style={{display:"flex",alignItems:"center",border:`2px solid ${activeType?.color}`,borderRadius:8,overflow:"hidden"}}>
              <button onClick={()=>updQty(pid,activeList,-1)} style={{background:"white",border:"none",color:activeType?.color,width:28,height:30,cursor:"pointer",fontSize:16,fontWeight:800}}>−</button>
              <span style={{background:activeType?.color,color:"white",width:28,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800}}>{qi.qty}</span>
              <button onClick={()=>updQty(pid,activeList,1)} style={{background:"white",border:"none",color:activeType?.color,width:28,height:30,cursor:"pointer",fontSize:16,fontWeight:800}}>+</button>
            </div>
          ):(
            <button onClick={()=>addToQuote(p)} disabled={!price||price===0} style={{background:price&&price>0?activeType?.color:"#E0E8F0",color:price&&price>0?"white":C.border,border:"none",borderRadius:8,padding:"6px 14px",cursor:price&&price>0?"pointer":"not-allowed",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>+ Cotizar</button>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* HEADER */}
      <div style={{background:"white",borderBottom:`2px solid ${C.border}`,boxShadow:"0 2px 12px rgba(27,59,111,0.07)",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1280,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:68}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:50,height:50,background:"white",borderRadius:12,border:`2px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",padding:4,boxShadow:"0 1px 4px rgba(27,59,111,0.1)"}}>
              <img src={LOGO} style={{width:"100%",height:"100%",objectFit:"contain"}} alt="MSJ"/>
            </div>
            <div>
              <div style={{fontWeight:900,fontSize:20,color:C.navy,letterSpacing:"-0.5px"}}>MSJ</div>
              <div style={{fontSize:10,color:C.teal,textTransform:"uppercase",letterSpacing:2,fontWeight:700}}>Lista de Precios</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {products.length>0&&(
              <span style={{fontSize:12,color:C.muted,background:C.bg,padding:"5px 12px",borderRadius:20,border:`1px solid ${C.border}`}}>
                {products.length} productos
              </span>
            )}
            <button onClick={()=>fetchData(sheetId,sheetName)} disabled={!sheetId||loading} style={{background:C.tealLight,color:C.teal,border:`1.5px solid ${C.teal}55`,borderRadius:9,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>
              {loading?"⏳":"🔄"} Actualizar
            </button>
            {quote.length>0&&(
              <button onClick={()=>setShowQuote(true)} style={{background:C.navy,color:"white",border:"none",borderRadius:9,padding:"8px 18px",cursor:"pointer",fontWeight:800,fontSize:13,display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 12px rgba(27,59,111,0.3)"}}>
                🧾 Cotización <span style={{background:"rgba(255,255,255,0.25)",borderRadius:20,padding:"1px 8px",fontSize:11}}>{quote.reduce((s,q)=>s+q.qty,0)}</span>
              </button>
            )}
            <button onClick={()=>setShowCfg(true)} style={{background:C.navyLight,color:C.navy,border:`1.5px solid ${C.border}`,borderRadius:9,padding:"8px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>⚙️ Sheets</button>
          </div>
        </div>
      </div>

      {/* CONFIG MODAL */}
      {showCfg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(27,59,111,0.55)",backdropFilter:"blur(4px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
          <div style={{background:"white",borderRadius:20,padding:32,width:"100%",maxWidth:500,boxShadow:"0 20px 60px rgba(27,59,111,0.2)",maxHeight:"95vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22}}>
              <img src={LOGO} style={{width:44,height:44,objectFit:"contain",background:"white",borderRadius:8,padding:2}} />
              <div>
                <h2 style={{margin:0,fontSize:18,color:C.navy,fontWeight:900}}>Conectar Google Sheets</h2>
                <p style={{margin:0,fontSize:12,color:C.muted}}>Datos en tiempo real — actualización automática</p>
              </div>
            </div>
            <div style={{background:`linear-gradient(135deg,${C.navyLight},${C.tealLight})`,borderRadius:14,padding:18,marginBottom:18,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:800,color:C.navy,marginBottom:10}}>📋 Solo 2 pasos (una sola vez)</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{background:C.navy,color:"white",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>1</span>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>En Google Sheets: <strong>Archivo → Compartir → Compartir con otros</strong><br/><span style={{color:C.teal,fontWeight:700}}>→ "Cualquier persona con el enlace" → Ver → Listo</span></div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{background:C.navy,color:"white",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>2</span>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6}}>Copia el <strong>ID</strong> de la URL y el <strong>nombre de la pestaña</strong> y pégalos abajo</div>
                </div>
              </div>
            </div>
            <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.muted}}>
              <strong style={{color:C.navy}}>Encabezados requeridos en fila 1:</strong><br/>
              <code style={{color:C.blue,fontSize:12}}>Codigo · Producto · Categoria · Precio PV · Precio Vet · Precio Pub</code>
            </div>
            <label style={{display:"block",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>ID de la hoja</div>
              <input value={cfgId} onChange={e=>setCfgId(e.target.value)} placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
                style={{width:"100%",border:`1.5px solid ${cfgId?C.teal:C.border}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.text,fontFamily:"monospace",boxSizing:"border-box"}} />
              <div style={{fontSize:11,color:C.muted,marginTop:3}}>docs.google.com/spreadsheets/d/<strong style={{color:C.teal}}>ESTE_ID</strong>/edit</div>
            </label>
            <label style={{display:"block",marginBottom:18}}>
              <div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>Nombre exacto de la pestaña</div>
              <input value={cfgName} onChange={e=>setCfgName(e.target.value)} placeholder="Hoja1"
                style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:13,color:C.text,boxSizing:"border-box"}} />
            </label>
            {error&&<div style={{background:"#FEF0F0",border:"1px solid #FAC",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#C0392B",marginBottom:14}}>⚠️ {error}</div>}
            <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:16}}>
              <button onClick={()=>setShowCsv(v=>!v)} style={{background:"none",border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:12,color:C.muted,width:"100%",fontWeight:600}}>
                {showCsv?"▲ Ocultar":"▼ Cargar CSV manualmente (sin conexión automática)"}
              </button>
              {showCsv&&(
                <div style={{marginTop:10}}>
                  <div style={{fontSize:12,color:C.muted,marginBottom:6,lineHeight:1.6}}>En Google Sheets: <strong>Archivo → Descargar → CSV</strong>. Abre con bloc de notas, selecciona todo y pega aquí:</div>
                  <textarea value={csvText} onChange={e=>setCsvText(e.target.value)} rows={4} placeholder="Pega el contenido CSV aquí..."
                    style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 12px",fontSize:12,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box"}} />
                  <button onClick={()=>{if(csvText){loadCsv(csvText);setShowCfg(false);}}} disabled={!csvText}
                    style={{marginTop:8,width:"100%",background:csvText?C.teal:"#ccc",color:"white",border:"none",borderRadius:8,padding:"9px",cursor:csvText?"pointer":"not-allowed",fontWeight:700,fontSize:13}}>
                    Cargar CSV →
                  </button>
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              {sheetId&&<button onClick={()=>setShowCfg(false)} style={{background:C.bg,color:C.muted,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 18px",cursor:"pointer",fontWeight:700}}>Cancelar</button>}
              <button onClick={()=>{setSheetId(cfgId);setSheetName(cfgName||"Hoja1");fetchData(cfgId,cfgName||"Hoja1");setShowCfg(false);}} disabled={!cfgId}
                style={{background:cfgId?C.navy:"#ccc",color:"white",border:"none",borderRadius:10,padding:"10px 24px",cursor:cfgId?"pointer":"not-allowed",fontWeight:800,fontSize:14}}>
                Conectar →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* QUOTE MODAL */}
      {showQuote&&(
        <div style={{position:"fixed",inset:0,background:"rgba(27,59,111,0.55)",backdropFilter:"blur(4px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"white",borderRadius:20,width:"100%",maxWidth:640,maxHeight:"92vh",overflow:"auto",boxShadow:"0 20px 60px rgba(27,59,111,0.2)"}}>
            <div style={{padding:"20px 26px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"white",zIndex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <img src={LOGO} style={{width:38,height:38,objectFit:"contain",background:"white",borderRadius:6,padding:2}} />
                <div>
                  <div style={{fontWeight:900,fontSize:17,color:C.navy}}>🧾 Cotización</div>
                  <div style={{fontSize:11,color:C.muted}}>{quote.reduce((s,q)=>s+q.qty,0)} ítems · {quote.length} productos</div>
                </div>
              </div>
              <button onClick={()=>setShowQuote(false)} style={{background:C.bg,border:"none",color:C.muted,borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,fontWeight:800}}>✕</button>
            </div>
            <div style={{padding:"18px 26px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                <label><div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Cliente</div>
                  <input value={client} onChange={e=>setClient(e.target.value)} placeholder="Nombre del cliente" style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,boxSizing:"border-box"}} /></label>
                <label><div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Descuento %</div>
                  <input type="number" min="0" max="100" value={disc} onChange={e=>setDisc(Number(e.target.value))} style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,boxSizing:"border-box"}} /></label>
              </div>
              <div style={{border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:14}}>
                {quote.map(q=>{
                  const lt=LISTS.find(l=>l.key===q.listType);
                  return(
                    <div key={q.id+q.listType} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderBottom:`1px solid ${C.border}`}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.product[nameKey]}</div>
                        <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                          <span style={{background:lt?.bg,color:lt?.color,padding:"1px 8px",borderRadius:20,fontWeight:700,fontSize:10}}>{q.listLabel}</span> · {fmt(q.price)} c/u
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",border:`2px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                        <button onClick={()=>updQty(q.id,q.listType,-1)} style={{background:"white",border:"none",color:C.navy,width:26,height:28,cursor:"pointer",fontSize:15,fontWeight:800}}>−</button>
                        <span style={{background:C.navy,color:"white",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800}}>{q.qty}</span>
                        <button onClick={()=>updQty(q.id,q.listType,1)} style={{background:"white",border:"none",color:C.navy,width:26,height:28,cursor:"pointer",fontSize:15,fontWeight:800}}>+</button>
                      </div>
                      <div style={{fontSize:14,fontWeight:800,color:C.navy,minWidth:88,textAlign:"right"}}>{fmt(q.price*q.qty)}</div>
                      <button onClick={()=>rmQuote(q.id,q.listType)} style={{background:"none",border:"none",color:"#E74C3C",cursor:"pointer",fontSize:14,padding:4}}>🗑️</button>
                    </div>
                  );
                })}
                {disc>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"#FFF8ED",color:"#E67E22",fontSize:13,fontWeight:700}}>
                  <span>Descuento ({disc}%)</span><span>−{fmt(discAmt)}</span>
                </div>}
                <div style={{display:"flex",justifyContent:"space-between",padding:"14px",background:C.navy,color:"white"}}>
                  <span style={{fontWeight:900,fontSize:16}}>TOTAL</span>
                  <span style={{fontWeight:900,fontSize:20}}>{fmt(total)}</span>
                </div>
              </div>
              <label style={{display:"block",marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:800,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Notas / Condiciones</div>
                <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="Condiciones de pago, tiempo de entrega..."
                  style={{width:"100%",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:13,resize:"vertical",boxSizing:"border-box"}} />
              </label>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setQuote([])} style={{background:"#FEF0F0",color:"#C0392B",border:"1px solid #FAC",borderRadius:9,padding:"10px 14px",cursor:"pointer",fontWeight:700,fontSize:13}}>Limpiar</button>
                <button onClick={printQuote} style={{flex:1,background:`linear-gradient(135deg,${C.navy},${C.blue})`,color:"white",border:"none",borderRadius:9,padding:"10px",cursor:"pointer",fontWeight:800,fontSize:14,boxShadow:"0 4px 12px rgba(27,59,111,0.3)"}}>
                  🖨️ Imprimir / Exportar PDF
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* MAIN */}
      <div style={{maxWidth:1280,margin:"0 auto",padding:"24px"}}>
        {!sheetId||products.length===0?(
          <div style={{textAlign:"center",padding:"100px 20px"}}>
            {loading?(
              <div><div style={{fontSize:48,marginBottom:16}}>⏳</div><div style={{color:C.muted,fontSize:16}}>Cargando productos...</div></div>
            ):(
              <div>
                <img src={LOGO} style={{width:90,height:90,objectFit:"contain",marginBottom:24}} />
                <h2 style={{fontSize:22,color:C.navy,marginBottom:10,fontWeight:900}}>Conecta tu lista de precios</h2>
                <p style={{color:C.muted,marginBottom:28,maxWidth:400,margin:"0 auto 28px",lineHeight:1.7}}>Configura tu Google Sheets para comenzar a cotizar en tiempo real.</p>
                <button onClick={()=>setShowCfg(true)} style={{background:C.navy,color:"white",border:"none",borderRadius:12,padding:"14px 32px",cursor:"pointer",fontWeight:800,fontSize:15,boxShadow:"0 8px 20px rgba(27,59,111,0.3)"}}>Configurar Google Sheets →</button>
                {error&&<div style={{marginTop:16,color:"#C0392B",fontSize:13}}>⚠️ {error}</div>}
              </div>
            )}
          </div>
        ):(
          <>
            {/* Controls bar */}
            <div style={{background:"white",borderRadius:16,padding:18,marginBottom:18,border:`1px solid ${C.border}`,boxShadow:"0 2px 8px rgba(27,59,111,0.05)"}}>
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                {LISTS.map(l=>(
                  <button key={l.key} onClick={()=>setActiveList(l.key)} style={{padding:"9px 22px",borderRadius:9,border:`2px solid ${activeList===l.key?l.color:C.border}`,background:activeList===l.key?l.color:"white",color:activeList===l.key?"white":C.muted,fontWeight:800,fontSize:13,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",gap:6}}>
                    {l.icon} {l.label}
                  </button>
                ))}
                {quote.length>0&&(
                  <div onClick={()=>setShowQuote(true)} style={{marginLeft:"auto",background:C.tealLight,border:`1.5px solid ${C.teal}`,borderRadius:9,padding:"9px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,color:C.teal,fontWeight:800}}>Cotización: {fmt(total)}</span>
                    <span style={{background:C.teal,color:"white",borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:800}}>{quote.reduce((s,q)=>s+q.qty,0)}</span>
                  </div>
                )}
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{flex:1,minWidth:200,display:"flex",alignItems:"center",gap:8,border:`1.5px solid ${C.border}`,borderRadius:9,padding:"0 12px",background:C.bg}}>
                  <span style={{color:C.muted}}>🔍</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre o código..."
                    style={{background:"none",border:"none",color:C.text,fontSize:13,flex:1,padding:"9px 0"}} />
                  {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14}}>✕</button>}
                </div>
                {categories.length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <button onClick={()=>setCategory("all")} style={{padding:"7px 14px",borderRadius:8,border:`1.5px solid ${category==="all"?C.teal:C.border}`,background:category==="all"?C.tealLight:"white",color:category==="all"?C.teal:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>Todas</button>
                    {categories.map(cat=>(
                      <button key={cat} onClick={()=>setCategory(cat)} style={{padding:"7px 14px",borderRadius:8,border:`1.5px solid ${category===cat?C.teal:C.border}`,background:category===cat?C.tealLight:"white",color:category===cat?C.teal:C.muted,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
                        {cat}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Table */}
            <div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${C.border}`,boxShadow:"0 4px 16px rgba(27,59,111,0.07)"}}>
              <div style={{background:C.navy,display:"grid",gridTemplateColumns:codeKey?"90px 1fr"+(catKey?" 130px":"")+" 130px 140px":"1fr"+(catKey?" 130px":"")+" 130px 140px",padding:"11px 20px",gap:12}}>
                {codeKey&&<div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:1}}>Código</div>}
                <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:1}}>Producto</div>
                {catKey&&<div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:1}}>Categoría</div>}
                <div style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:1,textAlign:"right"}}>Precio {activeType?.short}</div>
                <div></div>
              </div>
              <div style={{background:"white"}}>
                {filtered.length===0?(
                  <div style={{textAlign:"center",padding:48,color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>🔍</div>Sin resultados para esa búsqueda</div>
                ):category!=="all"||!grouped?(
                  filtered.map((p,i)=><ProductRow key={i} p={p} idx={i}/>)
                ):(
                  Object.entries(grouped).map(([cat,prods])=>(
                    <div key={cat}>
                      <div style={{padding:"9px 20px",background:`linear-gradient(90deg,${C.blueLight},${C.tealLight})`,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:4,height:16,background:C.teal,borderRadius:2}}></div>
                        <span style={{fontSize:13,fontWeight:800,color:C.navy}}>{cat}</span>
                        <span style={{fontSize:11,color:C.muted,background:"white",padding:"1px 8px",borderRadius:20}}>{prods.length} productos</span>
                      </div>
                      {prods.map((p,i)=><ProductRow key={i} p={p} idx={i}/>)}
                    </div>
                  ))
                )}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
